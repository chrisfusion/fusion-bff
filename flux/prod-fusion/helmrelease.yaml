apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fusion-bff
  namespace: prod-fusion
spec:
  interval: 10m
  chart:
    spec:
      chart: fusion-bff
      version: "~0.1.0"
      sourceRef:
        kind: HelmRepository
        name: fusion-bff
        namespace: flux-system
  values:
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    config:
      oidcIssuerUrl: "https://keycloak.prod.internal/realms/fusion"
      oidcClientId: "fusion-gui"
      allowedUsers: ""
      forgeUrl: "http://fusion-forge.prod-fusion.svc.cluster.local:8080"
      indexUrl: "http://fusion-index-backend.prod-fusion.svc.cluster.local:8080"
      weaveUrl: "http://fusion-weave-api.prod-fusion.svc.cluster.local:8082"
