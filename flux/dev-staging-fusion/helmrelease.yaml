apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fusion-bff
  namespace: dev-staging-fusion
spec:
  interval: 10m
  chart:
    spec:
      chart: fusion-bff
      version: ">=0.1.0"
      sourceRef:
        kind: HelmRepository
        name: fusion-bff
        namespace: flux-system
  values:
    replicaCount: 1
    config:
      oidcIssuerUrl: "https://keycloak.staging.internal/realms/fusion"
      oidcClientId: "fusion-gui-staging"
      allowedUsers: ""
      forgeUrl: "http://fusion-forge.dev-staging-fusion.svc.cluster.local:8080"
      indexUrl: "http://fusion-index-backend.dev-staging-fusion.svc.cluster.local:8080"
      weaveUrl: "http://fusion-weave-api.dev-staging-fusion.svc.cluster.local:8082"
