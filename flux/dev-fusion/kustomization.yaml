apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fusion-bff
  namespace: flux-system
spec:
  interval: 5m
  path: ./flux/dev-fusion
  prune: true
  sourceRef:
    kind: GitRepository
    name: fusion-platform
  targetNamespace: dev-fusion
  decryption:
    provider: sops
    secretRef:
      name: sops-age-key
