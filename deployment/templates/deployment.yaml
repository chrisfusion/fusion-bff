apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusion-bff.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fusion-bff.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fusion-bff.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fusion-bff.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "fusion-bff.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: fusion-bff
        - name: weave-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
        - name: rbac-config
          configMap:
            name: {{ include "fusion-bff.fullname" . }}-rbac
      containers:
        - name: fusion-bff
          image: {{ include "fusion-bff.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "fusion-bff.fullname" . }}
          env:
            - name: K8S_SA_TOKEN_PATH
              value: /var/run/secrets/fusion-bff/token
            - name: WEAVE_SA_TOKEN_PATH
              value: /var/run/secrets/fusion-bff/weave/token
            {{- if and .Values.secret.create (not .Values.config.oidcBypass) }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-bff.fullname" . }}
                  key: OIDC_CLIENT_SECRET
            {{- end }}
            {{- if .Values.secret.create }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusion-bff.fullname" . }}
                  key: SESSION_SECRET
            {{- end }}
          volumeMounts:
            - name: sa-token
              mountPath: /var/run/secrets/fusion-bff
              readOnly: true
            - name: weave-sa-token
              mountPath: /var/run/secrets/fusion-bff/weave
              readOnly: true
            - name: rbac-config
              mountPath: /etc/fusion-bff
              readOnly: true
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
