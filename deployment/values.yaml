replicaCount: 1

image:
  repository: ghcr.io/fusion-platform/fusion-bff
  tag: ""  # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /livez
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

secret:
  # Set create: false to manage the Secret outside Helm (e.g. Sealed Secrets / ESO).
  # When create: false, create a Secret with the same name as the release and keys
  # OIDC_CLIENT_SECRET and SESSION_SECRET before installing.
  create: true
  oidcClientSecret: ""   # required — confidential OIDC client secret
  sessionSecret: ""      # required — random 32+ byte value used to identify the session layer

config:
  httpPort: "8080"
  # OIDC — required when oidcBypass is false
  oidcIssuerUrl: ""       # e.g. https://keycloak.example.com/realms/fusion
  oidcClientId: ""        # expected aud claim
  oidcJwksUrl: ""         # optional — defaults to {oidcIssuerUrl}/protocol/openid-connect/certs
  oidcJwksCacheTtl: "15m"
  saTokenCacheTtl: "5m"
  allowlistCacheTtl: "30s"
  allowedUsers: ""        # comma-separated sub or email values; empty = allow all
  forgeUrl: "http://fusion-forge.fusion.svc.cluster.local:8080"
  indexUrl: "http://fusion-index-backend.fusion.svc.cluster.local:8080"
  weaveUrl: "http://fusion-weave-api.fusion.svc.cluster.local:8082"
  # BFF session layer — required when oidcBypass is false
  oidcRedirectUrl: ""         # e.g. https://bff.example.com/bff/callback
  oidcPublicAuthUrl: ""       # optional — browser-visible Keycloak URL; defaults to oidcIssuerUrl
  sessionCookieName: "sid"
  sessionCookieDomain: ""     # "" = no Domain attr, "auto" = derive from request Host
  sessionCookieSecure: "false" # set "true" in production (requires HTTPS)
  sessionMaxAge: "8h"
  corsOrigins: ""             # comma-separated allowed origins; empty = CORS disabled
  postLoginRedirectUrl: "/"   # where to send the browser after a successful login
  # Mock OIDC bypass — development only, never enable in production
  oidcBypass: false
  oidcBypassBaseUrl: ""       # browser-visible BFF URL; defaults to http://localhost:{httpPort}
  oidcBypassSub: "dev-user"
  oidcBypassEmail: "dev@local"
  oidcBypassName: "Dev User"
  oidcBypassGroups: ""        # comma-separated default groups pre-selected in mock login form
  rbacConfigPath: "/etc/fusion-bff/rbac.yaml"
  # Database — required when rbac.yaml group_source is "db" or "both"
  dbDsn: ""                  # full PostgreSQL DSN; set via --set or override in values-dev.yaml
